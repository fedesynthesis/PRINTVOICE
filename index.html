<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PrintVoice">
<meta name="theme-color" content="#0a0a0f">
<title>PrintVoice</title>

<!-- PWA Manifest inline via JS -->
<script>
// Inject manifest dynamically (works from file:// and any host)
const manifest = {
  name: "PrintVoice",
  short_name: "PrintVoice",
  description: "Stampa file aziendali con la voce",
  start_url: ".",
  display: "standalone",
  background_color: "#0a0a0f",
  theme_color: "#0a0a0f",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%230a0a0f'/%3E%3Crect x='16' y='16' width='160' height='160' rx='32' fill='%2312121a'/%3E%3Ctext x='96' y='125' font-size='80' text-anchor='middle'%3E%F0%9F%96%A8%EF%B8%8F%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230a0a0f'/%3E%3Crect x='32' y='32' width='448' height='448' rx='80' fill='%2312121a'/%3E%3Ctext x='256' y='330' font-size='220' text-anchor='middle'%3E%F0%9F%96%A8%EF%B8%8F%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);
</script>

<!-- Apple Touch Icon inline SVG -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0a0f'/%3E%3Ctext x='90' y='120' font-size='90' text-anchor='middle'%3E%F0%9F%96%A8%EF%B8%8F%3C/text%3E%3C/svg%3E">

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #1e1e2e;
  --accent: #00e5ff;
  --accent2: #ff6b6b;
  --text: #e8e8f0;
  --muted: #555570;
  --success: #00ff88;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 10;
  padding: calc(var(--safe-top) + 10px) 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
}

.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), #0066ff);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}

.logo-text { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; }
.logo-text span { color: var(--accent); }

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  transition: all 0.3s;
  flex-shrink: 0;
}
.dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); animation: blink 2s infinite; }
.dot.offline { background: var(--accent2); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.btn-cfg {
  width: 34px; height: 34px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-cfg:active { background: var(--surface2); color: var(--accent); }

/* ── CONFIG MODAL ── */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  align-items: flex-end;
}
.modal-backdrop.open { display: flex; }

.modal-sheet {
  width: 100%;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(var(--safe-bottom) + 20px);
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 20px;
}

.modal-title {
  font-size: 17px; font-weight: 800;
  margin-bottom: 18px;
  color: var(--text);
}

.field {
  margin-bottom: 14px;
}
.field label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.field input:focus { border-color: var(--accent); }

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 1px;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-primary:active { opacity: 0.85; transform: scale(0.98); }

/* ── CHAT ── */
#chat {
  position: relative;
  z-index: 10;
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  max-width: 82%;
  padding: 11px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.5;
  animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }

.msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #003399, #0055cc);
  border-bottom-right-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
}
.msg.ai {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.system {
  align-self: center;
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-align: center;
  border-radius: 10px;
  max-width: 90%;
  padding: 8px 14px;
}
.msg.ok  { border-color: var(--success); color: var(--success); }
.msg.err { border-color: var(--accent2); color: var(--accent2); }

.msg-tag {
  font-size: 9px; font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
  font-family: 'DM Mono', monospace;
}

.typing { display:flex; gap:5px; align-items:center; padding:14px; }
.typing span {
  width:6px; height:6px;
  background: var(--accent); border-radius:50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

/* ── CONTROLS ── */
#controls {
  position: relative;
  z-index: 10;
  padding: 16px 20px calc(var(--safe-bottom) + 16px);
  border-top: 1px solid var(--border);
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

/* Waveform */
#waveform {
  display: flex;
  gap: 3px;
  align-items: center;
  height: 22px;
  opacity: 0;
  transition: opacity 0.3s;
}
#waveform.active { opacity: 1; }
.wbar {
  width: 3px;
  background: var(--accent);
  border-radius: 2px;
  height: 4px;
  transition: height 0.08s;
}

/* Mic button */
#mic-btn {
  width: 68px; height: 68px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 26px;
  cursor: pointer;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
  -webkit-appearance: none;
}
#mic-btn.listening {
  background: rgba(0,229,255,0.12);
  border-color: var(--accent);
  box-shadow: 0 0 0 8px rgba(0,229,255,0.08), 0 0 0 16px rgba(0,229,255,0.04);
  animation: micring 1.8s infinite;
}
@keyframes micring {
  0%,100%{box-shadow:0 0 0 8px rgba(0,229,255,0.08),0 0 0 16px rgba(0,229,255,0.04)}
  50%{box-shadow:0 0 0 12px rgba(0,229,255,0.05),0 0 0 22px rgba(0,229,255,0.02)}
}

#mic-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
}

/* bottom row */
.bottom-row {
  display: flex;
  gap: 10px;
  width: 100%;
}
.btn-secondary {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 12px;
  padding: 11px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  letter-spacing: 0.3px;
  transition: all 0.2s;
}
.btn-secondary:active { background: var(--surface2); border-color: var(--accent); }

/* ── FILE LIST MODAL ── */
#file-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); flex-direction:column; }
#file-modal.open { display:flex; }

.file-modal-inner {
  flex:1;
  display:flex;
  flex-direction:column;
  padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 16px);
  gap: 12px;
}

.file-modal-header { display:flex; align-items:center; justify-content:space-between; }
.file-modal-title { font-size:18px; font-weight:800; }
.file-modal-title span { color:var(--accent); }
.btn-close {
  width:34px; height:34px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-size:16px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}

#file-list {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.fitem {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  animation: pop 0.2s cubic-bezier(0.34,1.56,0.64,1);
  transition: border-color 0.15s;
}
.fitem:active { border-color:var(--accent); background:rgba(0,229,255,0.05); }

.fitem-icon { font-size:24px; flex-shrink:0; }
.fitem-info { flex:1; min-width:0; }
.fitem-name { font-family:'DM Mono',monospace; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fitem-size { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:2px; }
.btn-print {
  background:var(--accent);
  color:var(--bg);
  border:none;
  border-radius:8px;
  padding:7px 12px;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:11px;
  cursor:pointer;
  flex-shrink:0;
  letter-spacing:0.5px;
}

/* ── INSTALL BANNER ── */
#install-banner {
  display:none;
  position:relative; z-index:10;
  margin:10px 16px 0;
  background:linear-gradient(135deg,rgba(0,229,255,0.1),rgba(0,102,255,0.1));
  border:1px solid rgba(0,229,255,0.3);
  border-radius:14px;
  padding:12px 14px;
  flex-direction:column;
  gap:6px;
  flex-shrink:0;
}
#install-banner.show { display:flex; }
.banner-title { font-size:13px; font-weight:800; color:var(--accent); }
.banner-steps { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); line-height:1.7; }
.banner-close {
  position:absolute; top:10px; right:12px;
  background:none; border:none;
  color:var(--muted); font-size:16px; cursor:pointer;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-icon">🖨️</div>
  <div class="logo-text">Print<span>Voice</span></div>
  <div class="header-right">
    <div class="status-pill">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">offline</span>
    </div>
    <button class="btn-cfg" onclick="openCfg()">⚙️</button>
  </div>
</header>

<!-- INSTALL BANNER (shown when not standalone) -->
<div id="install-banner">
  <button class="banner-close" onclick="this.parentElement.classList.remove('show')">×</button>
  <div class="banner-title">📲 Installa su iPhone</div>
  <div class="banner-steps">
    1. Tocca <strong>⎙ Condividi</strong> in Safari<br>
    2. Scorri e tocca <strong>"Aggiungi a schermata Home"</strong><br>
    3. Tocca <strong>Aggiungi</strong> → apri PrintVoice come app!
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div class="msg system">Configura il server (⚙️) e connettiti, poi parla per stampare.</div>
</div>

<!-- FILE MODAL -->
<div id="file-modal">
  <div class="file-modal-inner">
    <div class="file-modal-header">
      <div class="file-modal-title">📁 File <span>disponibili</span></div>
      <button class="btn-close" onclick="closeFileModal()">✕</button>
    </div>
    <div id="file-list"></div>
  </div>
</div>

<!-- CONFIG MODAL -->
<div class="modal-backdrop" id="cfg-modal" onclick="closeCfgOnBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ Configurazione Server</div>
    <div class="field">
      <label>Indirizzo IP del Server Windows</label>
      <input type="text" id="srv-ip" placeholder="es. 192.168.1.100" inputmode="numeric">
    </div>
    <div class="field">
      <label>Porta</label>
      <input type="number" id="srv-port" placeholder="8765" value="8765">
    </div>
    <div class="field">
      <label>Cartella stampe (opzionale)</label>
      <input type="text" id="srv-folder" placeholder="es. C:\Stampe">
    </div>
    <div class="field">
      <label>🔒 Password</label>
      <input type="password" id="srv-password" placeholder="Password di accesso">
    </div>
    <button class="btn-primary" onclick="connectServer()">CONNETTI AL SERVER</button>
  </div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <div id="waveform">
    <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div>
  </div>
  <button id="mic-btn" onclick="toggleMic()">🎤</button>
  <div id="mic-label">Premi per parlare</div>
  <div class="bottom-row">
    <button class="btn-secondary" onclick="showFiles()">📁 File</button>
    <button class="btn-secondary" onclick="clearChat()">🗑 Pulisci</button>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
let ws = null, isConnected = false;
let recognition = null, isListening = false;
let conversationHistory = [];
let waveInterval = null;
let typingEl = null;
window._files = [];

// ─── PWA: Show install banner if not standalone ───────────
window.addEventListener('load', () => {
  const isStandalone = window.navigator.standalone === true
    || window.matchMedia('(display-mode: standalone)').matches;
  if (!isStandalone) {
    document.getElementById('install-banner').classList.add('show');
  }

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'printvoice-v1';
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
        self.skipWaiting();
      });
      self.addEventListener('fetch', e => {
        if (e.request.url.includes('googleapis.com') || e.request.url.includes('anthropic.com')) return;
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/')))
        );
      });
    `;
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL).catch(() => {});
  }

  // Load saved config
  const saved = localStorage.getItem('pv-config');
  if (saved) {
    try {
      const c = JSON.parse(saved);
      document.getElementById('srv-ip').value = c.ip || '';
      document.getElementById('srv-port').value = c.port || '8765';
      document.getElementById('srv-folder').value = c.folder || '';
    } catch(e){}
  }
});

// ─── CONFIG ──────────────────────────────────────────────
function openCfg() { document.getElementById('cfg-modal').classList.add('open'); }
function closeCfg() { document.getElementById('cfg-modal').classList.remove('open'); }
function closeCfgOnBackdrop(e) { if (e.target === document.getElementById('cfg-modal')) closeCfg(); }

function saveConfig() {
  localStorage.setItem('pv-config', JSON.stringify({
    ip: document.getElementById('srv-ip').value,
    port: document.getElementById('srv-port').value,
    folder: document.getElementById('srv-folder').value
  }));
}

// ─── WEBSOCKET ───────────────────────────────────────────
function connectServer() {
  const ip = document.getElementById('srv-ip').value.trim();
  const port = document.getElementById('srv-port').value.trim() || '8765';
  if (!ip) { addMsg('Inserisci l\'IP del server.','system err'); return; }

  saveConfig();
  if (ws) ws.close();
  const url = `ws://${ip}:${port}`;
  addMsg(`Connessione a ${ip}:${port}…`, 'system');

  try { ws = new WebSocket(url); } catch(e) {
    addMsg('Indirizzo non valido.','system err'); return;
  }

  ws.onopen = () => {
    // Invia subito la password per autenticarsi
    const pwd = document.getElementById('srv-password').value;
    ws.send(JSON.stringify({ action:'auth', password: pwd }));
  };

  ws.onmessage = (e) => {
    try { handleServer(JSON.parse(e.data)); } catch(_) { addMsg(e.data,'ai'); }
  };

  ws.onerror = () => {
    isConnected=false; setDot(false);
    addMsg('❌ Connessione fallita. Verifica IP, porta e che il server sia avviato.','system err');
  };

  ws.onclose = () => {
    isConnected=false; setDot(false);
    addMsg('Connessione chiusa.','system');
  };
}

function send(obj) { if(ws && isConnected) ws.send(JSON.stringify(obj)); }

function handleServer(data) {
  if (data.type === 'auth_ok') {
    isConnected = true; setDot(true);
    addMsg('✓ Connesso! ' + (data.message||''), 'system ok');
    closeCfg();
    send({ action:'list_files', folder: document.getElementById('srv-folder').value.trim() });
  } else if (data.type === 'auth_fail') {
    isConnected = false; setDot(false);
    addMsg('❌ ' + (data.message||'Autenticazione fallita.'), 'system err');
  } else if (data.type === 'file_list') {
    window._files = data.files || [];
    if (window._pendingShowFiles) { window._pendingShowFiles=false; renderFileModal(window._files); }
  } else if (data.type === 'print_result') {
    if (data.success) addMsg(`✓ Stampa avviata: ${data.file}`, 'system ok');
    else addMsg(`❌ Errore: ${data.error}`, 'system err');
  } else if (data.type === 'error') {
    addMsg('Server: ' + data.message, 'system err');
  }
}

function setDot(on) {
  document.getElementById('conn-dot').className = 'dot ' + (on?'online':'offline');
  document.getElementById('conn-label').textContent = on?'online':'offline';
}

// ─── SPEECH ──────────────────────────────────────────────
function toggleMic() { isListening ? stopListening() : startListening(); }

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addMsg('Usa Safari su iPhone per il riconoscimento vocale.','system err'); return; }

  recognition = new SR();
  recognition.lang = 'it-IT';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('mic-btn').classList.add('listening');
    document.getElementById('mic-label').textContent = 'Sto ascoltando…';
    document.getElementById('waveform').classList.add('active');
    startWave();
  };

  recognition.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    stopListening();
    addMsg(txt, 'user');
    processCommand(txt);
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error !== 'no-speech') addMsg('Errore microfono: ' + e.error, 'system err');
  };

  recognition.onend = () => stopListening();
  recognition.start();
}

function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(_){} recognition = null; }
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('mic-label').textContent = 'Premi per parlare';
  document.getElementById('waveform').classList.remove('active');
  stopWave();
}

function startWave() {
  const bars = document.querySelectorAll('.wbar');
  waveInterval = setInterval(() => {
    bars.forEach(b => b.style.height = (3 + Math.random()*17)+'px');
  }, 100);
}
function stopWave() {
  clearInterval(waveInterval);
  document.querySelectorAll('.wbar').forEach(b => b.style.height='4px');
}

// ─── AI ──────────────────────────────────────────────────
async function processCommand(text) {
  showTyping();
  conversationHistory.push({ role:'user', content:text });

  const fileList = window._files.length
    ? window._files.map(f=>f.name).join(', ')
    : 'lista non ancora caricata';

  const sys = `Sei un assistente stampa aziendale. L'utente ti dà ordini vocali in italiano per stampare file da un server Windows.
File disponibili: ${fileList}

Regole:
- Se l'utente vuole stampare un file specifico → rispondi SOLO con JSON: {"action":"print","file":"NOME_ESATTO"}
- Se l'utente chiede di vedere i file disponibili → rispondi SOLO con JSON: {"action":"list"}
- Se non è chiaro quale file → chiedi chiarimenti in italiano (solo testo, no JSON)
- Per saluti/domande generali → rispondi normalmente in italiano

Quando cerchi un file, considera corrispondenze parziali (es. "fattura marzo" → "Fattura_Marzo_2024.pdf").
Rispondi SEMPRE in italiano. JSON solo per le azioni.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: sys,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    hideTyping();

    const reply = data.content?.[0]?.text || '';
    conversationHistory.push({ role:'assistant', content:reply });

    const trimmed = reply.trim();
    if (trimmed.startsWith('{')) {
      try { handleAction(JSON.parse(trimmed)); return; } catch(_){}
    }
    addMsg(reply, 'ai');
  } catch(e) {
    hideTyping();
    addMsg('Errore AI: '+e.message, 'system err');
  }
}

function handleAction(a) {
  if (a.action === 'print') {
    if (!isConnected) { addMsg('Non connesso al server.','system err'); return; }
    addMsg(`Stampa in corso: ${a.file}`, 'ai');
    send({ action:'print', file:a.file, folder: document.getElementById('srv-folder').value.trim() });
  } else if (a.action === 'list') {
    showFiles();
  }
}

// ─── FILE MODAL ───────────────────────────────────────────
function showFiles() {
  if (!isConnected) { addMsg('Connettiti prima al server.','system err'); return; }
  if (window._files.length > 0) { renderFileModal(window._files); return; }
  window._pendingShowFiles = true;
  send({ action:'list_files', folder: document.getElementById('srv-folder').value.trim() });
  addMsg('Recupero lista file…','system');
}

function renderFileModal(files) {
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  if (!files.length) {
    list.innerHTML = '<div class="msg system">Nessun file trovato.</div>';
  } else {
    const icons = {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',txt:'📃',jpg:'🖼',jpeg:'🖼',png:'🖼',ppt:'📑',pptx:'📑'};
    files.forEach(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      const icon = icons[ext] || '📁';
      const div = document.createElement('div');
      div.className = 'fitem';
      div.innerHTML = `
        <div class="fitem-icon">${icon}</div>
        <div class="fitem-info">
          <div class="fitem-name">${f.name}</div>
          <div class="fitem-size">${f.size||''}</div>
        </div>
        <button class="btn-print" onclick="printFile('${f.name.replace(/'/g,"\\'")}')">Stampa</button>
      `;
      list.appendChild(div);
    });
  }
  document.getElementById('file-modal').classList.add('open');
}

function closeFileModal() { document.getElementById('file-modal').classList.remove('open'); }

function printFile(name) {
  closeFileModal();
  if (!isConnected) { addMsg('Non connesso.','system err'); return; }
  addMsg(`Stampa: ${name}`, 'user');
  send({ action:'print', file:name, folder: document.getElementById('srv-folder').value.trim() });
}

// ─── CHAT HELPERS ─────────────────────────────────────────
function addMsg(text, type) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  let cls = 'msg ';

  if (type==='user')         { cls+='user'; div.textContent=text; }
  else if (type==='ai')      { cls+='ai'; div.innerHTML=`<div class="msg-tag">Assistant</div>${esc(text)}`; }
  else if (type==='system ok') { cls+='system ok'; div.textContent=text; }
  else if (type==='system err'){ cls+='system err'; div.textContent=text; }
  else                        { cls+='system'; div.textContent=text; }

  div.className=cls.trim();
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function showTyping(){
  const chat=document.getElementById('chat');
  typingEl=document.createElement('div');
  typingEl.className='msg ai';
  typingEl.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(typingEl);
  chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){ if(typingEl){typingEl.remove();typingEl=null;} }

function clearChat(){
  document.getElementById('chat').innerHTML='<div class="msg system">Chat pulita.</div>';
  conversationHistory=[];
}
</script>
